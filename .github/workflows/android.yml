name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          pip install PyYAML

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Skeleton Assets (ROM-less Build)
        run: |
          mkdir -p include/assets
          echo -e "#ifndef MAP_OFFSETS_H\n#define MAP_OFFSETS_H\n#endif" > include/assets/map_offsets.h
          echo -e "#ifndef GFX_OFFSETS_H\n#define GFX_OFFSETS_H\n#endif" > include/assets/gfx_offsets.h
          echo -e "#ifndef ASSETS_H\n#define ASSETS_H\n#define ASSET_COUNT 0\n#endif" > include/assets/assets.h

      - name: Build Android APK
        run: |
          # 1. Generate the wrapper in the ROOT directory (where no build.gradle exists)
          # This prevents Gradle 9 from evaluating the Android project.
          gradle wrapper --gradle-version 8.10.2 --distribution-type all
          
          # 2. Move the generated wrapper files into the Android subdirectory
          # We use -f to overwrite any existing broken wrapper files
          mv -f gradlew Android/
          mv -f gradle/ Android/
          
          # 3. Enter the Android directory and use the NEW 8.10.2 wrapper
          cd Android
          chmod +x gradlew
          
          # Use the local wrapper (./gradlew) which is now version 8.10.2
          ./gradlew :app:assembleDebug --no-daemon --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
