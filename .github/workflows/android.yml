name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          pip install PyYAML

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Skeleton Assets (ROM-less Build)
        run: |
          mkdir -p include/assets
          echo -e "#ifndef MAP_OFFSETS_H\n#define MAP_OFFSETS_H\n#endif" > include/assets/map_offsets.h
          echo -e "#ifndef GFX_OFFSETS_H\n#define GFX_OFFSETS_H\n#endif" > include/assets/gfx_offsets.h
          echo -e "#ifndef ASSETS_H\n#define ASSETS_H\n#define ASSET_COUNT 0\n#endif" > include/assets/assets.h

      # ── THIS STEP WAS MISSING — it must run before assembleDebug ──────────
      # AAPT2 fails at processDebugResources if mipmap/ic_launcher is absent.
      # The script is already in the repo; it just was never called.
      - name: Generate Launcher Icons
        run: |
          chmod +x ./runtime/generate_icons.sh
          ./runtime/generate_icons.sh

      - name: Build Android APK
        run: |
          # 1. Create dummy settings to satisfy system Gradle 9
          echo "" > settings.gradle

          # 2. Generate wrapper with increased timeout
          # '-bin' keeps the download ~130 MB instead of ~180 MB
          gradle wrapper \
            --gradle-version 8.10.2 \
            --distribution-type bin \
            -Dorg.gradle.internal.http.connectionTimeout=60000 \
            -Dorg.gradle.internal.http.socketTimeout=60000

          # 3. Move wrapper files into the Android sub-project
          mv -f gradlew Android/
          mv -f gradle/ Android/
          rm settings.gradle

          # 4. Build
          cd Android
          chmod +x gradlew
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --info \
            -Dorg.gradle.internal.http.connectionTimeout=120000 \
            -Dorg.gradle.internal.http.socketTimeout=120000

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk