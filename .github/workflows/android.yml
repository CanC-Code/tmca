name: Android Build

on:
  workflow_dispatch: # Strict manual trigger only

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build gradle
          pip install PyYAML

      - name: Initialize Project & Assets
        # Generates Gradle 8.5 wrapper, settings.gradle (if missing), and assets.h
        run: python3 ./runtime/generate_assets_header.py

      - name: Prepare C++ Source (NDK Bridge)
        run: python3 ./runtime/prepare_source.py
  
      - name: Generate Icons
        run: |
          chmod +x runtime/generate_icons.sh
          ./runtime/generate_icons.sh


      - name: Build with Gradle
        run: |
          cd Android
          # Ensure the wrapper is executable
          chmod +x gradlew
          # Explicitly target the app module to resolve 'task not found'
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: "Android/app/build/outputs/apk/debug/*.apk"
