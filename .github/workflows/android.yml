name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          pip install PyYAML

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Skeleton Assets (ROM-less Build)
        run: |
          mkdir -p include/assets
          echo "#ifndef MAP_OFFSETS_H" > include/assets/map_offsets.h
          echo "#define MAP_OFFSETS_H" >> include/assets/map_offsets.h
          echo "#endif" >> include/assets/map_offsets.h
          
          echo "#ifndef GFX_OFFSETS_H" > include/assets/gfx_offsets.h
          echo "#define GFX_OFFSETS_H" >> include/assets/gfx_offsets.h
          echo "#endif" >> include/assets/gfx_offsets.h
          
          echo "#ifndef ASSETS_H" > include/assets/assets.h
          echo "#define ASSETS_H" >> include/assets/assets.h
          echo "#define ASSET_COUNT 0" >> include/assets/assets.h
          echo "#endif" >> include/assets/assets.h

      - name: Build Android APK
        run: |
          # 1. Generate the wrapper WITHOUT evaluating the Android project
          # We run this from the root so Gradle doesn't try to parse Android/build.gradle with the wrong version
          gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          
          # 2. Move the generated files into the Android folder where they belong
          mv gradlew Android/
          mv gradle/ Android/
          
          # 3. Enter the directory and build using the NEWLY generated 8.10.2 wrapper
          cd Android
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --info
