name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        # Added: libmagickwand-dev and build-essential for the C++ asset tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
          pip install PyYAML

      - name: Verify Build Environment
        run: python3 ./runtime/verify_build_env.py

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Project & Assets
        # We ensure executable permissions before running the generator
        run: |
          chmod +x ./runtime/generate_assets_header.py
          python3 ./runtime/generate_assets_header.py

      - name: Generate App Icons
        run: |
          chmod +x runtime/generate_icons.sh
          ./runtime/generate_icons.sh

      - name: Build Android APK with Gradle
        working-directory: ./Android
        run: |
          # Ensure gradlew is executable in the CI environment
          chmod +x gradlew
          # Added --info to help debug if the NDK fails to find map_offsets.h
          ./gradlew :app:assembleDebug --no-daemon --stacktrace --parallel --build-cache --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
