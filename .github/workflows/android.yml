name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build
          # Fix ImageMagick policy to allow path-based operations if needed
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
          pip install PyYAML

      - name: Initialize Project & Assets
        run: python3 ./runtime/generate_assets_header.py

      - name: Prepare C++ Source (NDK Bridge)
        run: python3 ./runtime/prepare_source.py

      - name: Generate Icons
        run: |
          chmod +x runtime/generate_icons.sh
          ./runtime/generate_icons.sh

      - name: Build with Gradle
        working-directory: ./Android
        run: |
          # Use the wrapper generated by your python script
          chmod +x gradlew
          # Added --parallel and --build-cache for speed
          ./gradlew :app:assembleDebug --no-daemon --stacktrace --parallel --build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
