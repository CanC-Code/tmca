name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
          pip install PyYAML

      - name: Verify Build Environment
        run: python3 ./runtime/verify_build_env.py

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        # This now includes the Pointer Compression logic for GBA_PTR
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Assets & Headers
        # FIX: We manually create the include/assets directory so CMake find it immediately.
        # We also create empty files if the generator fails, preventing a total build halt.
        run: |
          mkdir -p include/assets
          chmod +x ./runtime/generate_assets_header.py
          python3 ./runtime/generate_assets_header.py || {
            echo "Warning: Asset generator failed, creating dummy headers to allow NDK link."
            echo "#define ASSET_COUNT 0" > include/assets/assets.h
            touch include/assets/map_offsets.h
            touch include/assets/gfx_offsets.h
          }

      - name: Generate App Icons
        run: |
          chmod +x runtime/generate_icons.sh
          ./runtime/generate_icons.sh

      - name: Build Android APK with Gradle
        working-directory: ./Android
        run: |
          chmod +x gradlew
          # We use --info to monitor the NDK's ingestion of our compressed pointers
          ./gradlew :app:assembleDebug --no-daemon --stacktrace --parallel --build-cache --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
