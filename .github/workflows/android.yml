name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          pip install PyYAML

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Skeleton Assets (ROM-less Build)
        run: |
          mkdir -p include/assets
          echo "#ifndef MAP_OFFSETS_H" > include/assets/map_offsets.h
          echo "#define MAP_OFFSETS_H" >> include/assets/map_offsets.h
          echo "#endif" >> include/assets/map_offsets.h
          
          echo "#ifndef GFX_OFFSETS_H" > include/assets/gfx_offsets.h
          echo "#define GFX_OFFSETS_H" >> include/assets/gfx_offsets.h
          echo "#endif" >> include/assets/gfx_offsets.h
          
          echo "#ifndef ASSETS_H" > include/assets/assets.h
          echo "#define ASSETS_H" >> include/assets/assets.h
          echo "#define ASSET_COUNT 0" >> include/assets/assets.h
          echo "#endif" >> include/assets/assets.h

      - name: Build Android APK
        run: |
          cd Android
          
          # 1. Generate the wrapper directly in the target folder
          # Use --project-dir . to ensure it initializes in the current 'Android' directory
          # We use the system 'gradle' (9.3.1) only to download and set up the 8.10.2 environment
          gradle wrapper --gradle-version 8.10.2 --distribution-type all
          
          # 2. Verify wrapper files exist
          ls -R gradle/
          
          # 3. Build using the local (8.10.2) wrapper
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
