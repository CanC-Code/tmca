name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build gradle
          pip install PyYAML

      - name: Initialize Project & Assets
        # This now generates both the Gradle wrapper and assets.h
        run: python3 ./runtime/generate_assets_header.py

      - name: Prepare C++ Source (NDK Bridge)
        run: python3 ./runtime/prepare_source.py

      - name: Build with Gradle
        run: |
          cd Android
          # Ensure gradlew is executable even if generated on the fly
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: "Android/app/build/outputs/apk/debug/*.apk"
