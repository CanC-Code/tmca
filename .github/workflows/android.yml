Name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          pip install PyYAML

      - name: Verify Build Environment
        run: python3 ./runtime/verify_build_env.py

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        # This now includes the GBA_PTR pointer compression logic
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Project & Assets
        # FIX: We manually create the assets directory and headers 
        # to prevent "file not found" errors in the NDK stage.
        run: |
          mkdir -p include/assets
          chmod +x ./runtime/generate_assets_header.py
          python3 ./runtime/generate_assets_header.py
          # Ensure critical headers exist even if the generator is empty
          touch include/assets/map_offsets.h
          touch include/assets/gfx_offsets.h

      - name: Generate App Icons
        run: |
          chmod +x runtime/generate_icons.sh
          ./runtime/generate_icons.sh

      - name: Build Android APK with Gradle
        working-directory: ./Android
        run: |
          chmod +x gradlew
          # The --info flag remains vital for tracking the NDK's include paths
          ./gradlew :app:assembleDebug --no-daemon --stacktrace --parallel --build-cache --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
