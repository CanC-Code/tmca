name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        # This action is better at handling downloads and caching than raw shell commands
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          pip install PyYAML

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Skeleton Assets (ROM-less Build)
        run: |
          mkdir -p include/assets
          echo -e "#ifndef MAP_OFFSETS_H\n#define MAP_OFFSETS_H\n#endif" > include/assets/map_offsets.h
          echo -e "#ifndef GFX_OFFSETS_H\n#define GFX_OFFSETS_H\n#endif" > include/assets/gfx_offsets.h
          echo -e "#ifndef ASSETS_H\n#define ASSETS_H\n#define ASSET_COUNT 0\n#endif" > include/assets/assets.h

      - name: Build Android APK
        run: |
          # 1. Create dummy settings to satisfy system Gradle 9
          echo "" > settings.gradle
          
          # 2. Generate wrapper with increased timeout
          # We use '-bin' for a smaller download (~130MB vs ~180MB)
          gradle wrapper --gradle-version 8.10.2 --distribution-type bin -Dorg.gradle.internal.http.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000
          
          # 3. Move files to Android folder
          mv -f gradlew Android/
          mv -f gradle/ Android/
          rm settings.gradle
          
          # 4. Enter Android folder and build
          cd Android
          chmod +x gradlew
          
          # We pass the timeout properties again for the local wrapper's internal download
          ./gradlew :app:assembleDebug --no-daemon --info -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
