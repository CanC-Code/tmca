name: Android Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ninja-build build-essential libmagickwand-dev
          pip install PyYAML

      - name: Automate Source Revisions (32-bit to 64-bit Bridge)
        run: python3 ./runtime/source_patcher.py

      - name: Initialize Skeleton Assets (ROM-less Build)
        run: |
          mkdir -p include/assets
          echo "#ifndef MAP_OFFSETS_H" > include/assets/map_offsets.h
          echo "#define MAP_OFFSETS_H" >> include/assets/map_offsets.h
          echo "#endif" >> include/assets/map_offsets.h
          
          echo "#ifndef GFX_OFFSETS_H" > include/assets/gfx_offsets.h
          echo "#define GFX_OFFSETS_H" >> include/assets/gfx_offsets.h
          echo "#endif" >> include/assets/gfx_offsets.h
          
          echo "#ifndef ASSETS_H" > include/assets/assets.h
          echo "#define ASSETS_H" >> include/assets/assets.h
          echo "#define ASSET_COUNT 0" >> include/assets/assets.h
          echo "#endif" >> include/assets/assets.h

      - name: Generate App Icons
        run: |
          chmod +x runtime/generate_icons.sh
          ./runtime/generate_icons.sh || true

      - name: Build Android APK with Gradle
        run: |
          cd ${{ github.workspace }}/Android
          
          # 1. GENERATE COMPATIBLE GRADLE WRAPPER
          # Gradle 9 is too new for most current AGP versions. 
          # Pinning to 8.10.2 ensures compatibility with JDK 17 and AGP 8.x.
          gradle wrapper --gradle-version 8.10.2
          
          # 2. Set permissions and build
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Minish-NDK-debug-apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
